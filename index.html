<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V SCANS | عالم المانجا والمانهوا</title>
  <!-- Google Fonts & FontAwesome Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- الخلفية المتحركة المضيئة -->
  <div class="bg-glow"></div>

  <!-- الشريط العلوي (Navbar) -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="brand">
        <span class="v-logo">V</span>
        <span class="brand-name">SCANS</span>
      </div>
      
      <div class="nav-actions">
        <!-- قسم المستخدم بعد تسجيل الدخول -->
        <div id="user-section" style="display: none;">
          <div class="user-profile">
            <img id="user-avatar" src="" alt="Avatar">
            <span id="user-name"></span>
            <button id="logoutBtn" class="btn-logout" title="تسجيل الخروج">
              <i class="fas fa-sign-out-alt"></i>
            </button>
          </div>
        </div>

        <!-- قسم زوار (قبل تسجيل الدخول) -->
        <div id="auth-section">
          <button id="loginBtn" class="btn-login">
            <i class="fab fa-google"></i> تسجيل الدخول
          </button>
        </div>

        <button id="mobileMenuBtn" class="mobile-menu-btn">
          <i class="fas fa-bars"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- الواجهة الرئيسية والتصنيفات -->
  <div class="container">
    <!-- لوحة تحكم الإدارة (تظهر للآدمن فقط) -->
    <div id="admin-controls" class="admin-panel" style="display: none;">
      <h3><i class="fas fa-user-shield"></i> لوحة تحكم الإدارة</h3>
      <button id="openPublishModal" class="btn-primary">
        <i class="fas fa-plus-circle"></i> إضافة مانجا جديدة
      </button>
    </div>

    <!-- البانر الترحيبي الاحترافي -->
    <header class="hero-banner">
      <div class="hero-content">
        <h1>مرحباً بك في <span class="highlight">V SCANS</span></h1>
        <p>منصتك الاحترافية الأولى لقراءة وترجمة المانجا والمانهوا بأعلى جودة وعرض سينمائي متحرك.</p>
      </div>
    </header>

    <!-- تبويبات التصفح -->
    <div class="tabs-container">
      <button class="tab-btn active" data-target="manga-grid-section">
        <i class="fas fa-fire"></i> آخر التحديثات
      </button>
      <button class="tab-btn" id="categories-tab-btn" data-target="categories-section">
        <i class="fas fa-th-large"></i> التصنيفات
      </button>
    </div>

    <!-- شبكة المانجا الرئيسية -->
    <section id="manga-grid-section" class="tab-content active">
      <div id="manga-grid" class="manga-grid">
        <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> جاري تحميل الإبداع...</div>
      </div>
    </section>

    <!-- قسم التصنيفات -->
    <section id="categories-section" class="tab-content">
      <div id="categories-grid" class="categories-grid"></div>
      <div id="filtered-section" style="display: none; margin-top: 40px;">
        <h2 id="filtered-title" class="section-title"></h2>
        <div id="filtered-manga-grid" class="manga-grid"></div>
      </div>
    </section>
  </div>

  <!-- ── نافذة تفاصيل المانجا (Modal) ── -->
  <div id="mangaDetailModal" class="modal">
    <div class="modal-content large animate-slide-up">
      <button id="closeMangaDetail" class="close-modal"><i class="fas fa-times"></i></button>
      <div id="manga-detail-content"></div>
    </div>
  </div>

  <!-- ── نافذة القارئ السينمائي (Chapter Reader Modal) ── -->
  <div id="chapterReaderModal" class="modal reader-modal">
    <div class="modal-content full">
      <div class="reader-nav">
        <button id="closeChapterReader" class="btn-back"><i class="fas fa-arrow-right"></i> إغلاق القارئ</button>
        <h3 id="reader-title"></h3>
      </div>
      <div id="chapter-reader-content" class="reader-body"></div>
    </div>
  </div>

  <!-- ── نافذة إضافة مانجا (للمشرف) ── -->
  <div id="publishModal" class="modal">
    <div class="modal-content animate-slide-up">
      <button id="closePublishModal" class="close-modal"><i class="fas fa-times"></i></button>
      <h2>إضافة عمل جديد</h2>
      <div class="form-group">
        <label>عنوان العمل</label>
        <input type="text" id="manga-title" placeholder="مثال: Solo Leveling">
      </div>
      <div class="form-group">
        <label>رابط غلاف الصورة أو ارفع ملفاً</label>
        <input type="text" id="manga-cover-url" placeholder="رابط URL مباشر للصورة">
        <input type="file" id="manga-cover-file" accept="image/*" class="file-input">
      </div>
      <div id="cover-preview-container" class="preview-box" style="display:none;">
        <img id="cover-preview" src="" alt="Preview">
      </div>
      <div class="form-group">
        <label>حالة العمل</label>
        <select id="manga-status">
          <option value="مستمرة">مستمرة</option>
          <option value="مكتملة">مكتملة</option>
          <option value="متوقفة">متوقفة</option>
        </select>
      </div>
      <div class="form-group">
        <label>التصنيفات</label>
        <div id="categories-selector" class="chips-container"></div>
      </div>
      <div class="form-group">
        <label>القصة / الوصف</label>
        <textarea id="manga-desc" rows="4" placeholder="اكتب نبذة مختصرة عن القصة..."></textarea>
      </div>
      <button id="submitManga" class="btn-submit">نشر العمل الفني</button>
    </div>
  </div>

  <!-- ── نافذة تعديل مانجا ── -->
  <div id="editMangaModal" class="modal">
    <div class="modal-content animate-slide-up">
      <button id="closeEditMangaModal" class="close-modal"><i class="fas fa-times"></i></button>
      <h2>تعديل بيانات العمل</h2>
      <input type="hidden" id="edit-manga-id">
      <div class="form-group">
        <label>العنوان</label>
        <input type="text" id="edit-manga-title">
      </div>
      <div class="form-group">
        <label>رابط الغلاف</label>
        <input type="text" id="edit-manga-cover">
      </div>
      <div class="form-group">
        <label>الحالة</label>
        <select id="edit-manga-status">
          <option value="مستمرة">مستمرة</option>
          <option value="مكتملة">مكتملة</option>
          <option value="متوقفة">متوقفة</option>
        </select>
      </div>
      <div class="form-group">
        <label>التصنيفات</label>
        <div id="edit-categories-selector" class="chips-container"></div>
      </div>
      <div class="form-group">
        <label>الوصف</label>
        <textarea id="edit-manga-desc" rows="4"></textarea>
      </div>
      <button id="submitEditManga" class="btn-submit">حفظ التغييرات</button>
    </div>
  </div>

  <!-- ── نافذة إضافة فصل جديد ── -->
  <div id="addChapterModal" class="modal">
    <div class="modal-content animate-slide-up">
      <button id="closeChapterModal" class="close-modal"><i class="fas fa-times"></i></button>
      <h2>إضافة فصل جديد</h2>
      <div class="form-group">
        <label>رقم الفصل</label>
        <input type="number" id="chapter-number" placeholder="مثال: 1">
      </div>
      <div class="form-group">
        <label>عنوان الفصل (اختياري)</label>
        <input type="text" id="chapter-title-input" placeholder="مثال: البداية الجديدة">
      </div>
      <div class="form-group">
        <label>صفحات الفصل (يمكنك تحديد صور متعددة دفعة واحدة)</label>
        <input type="file" id="chapter-images" accept="image/*" multiple class="file-input">
      </div>
      <div id="upload-progress" class="progress-container" style="display:none;">
        <div id="progress-fill" class="progress-fill"></div>
        <span id="progress-text">جاري الرفع... 0%</span>
      </div>
      <div id="chapter-preview-grid" class="preview-grid"></div>
      <button id="submitChapter" class="btn-submit">رفع ونشر الفصل</button>
    </div>
  </div>

  <!-- التنبيهات المنبثقة الصامتة (Toast) -->
  <div id="toast" class="toast"></div>

  <!-- تشغيل نظام الـ Modules بأمان تامة -->
  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
