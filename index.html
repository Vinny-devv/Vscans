<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="V Scans – Read the best Manga and Manhwa online. Free chapters updated daily.">
  <meta name="theme-color" content="#7c3aed">

  <!-- Open Graph -->
  <meta property="og:title" content="V Scans – Manga & Manhwa Reader">
  <meta property="og:description" content="Read the best Manga and Manhwa online, free. Updated daily.">
  <meta property="og:type" content="website">

  <title>V Scans – Manga & Manhwa Reader</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://i.ibb.co/3YQx1Md2/0-DC7-EA69-7-A2-D-4588-9-BAE-3-D8018-FBA6-D0.png">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            purple: { DEFAULT: '#7c3aed', light: '#a855f7' },
            cyan:   { DEFAULT: '#06b6d4', light: '#22d3ee' }
          }
        }
      }
    };
  </script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- ══════════════════════════════════════════════════════════
       TOP NAVBAR
  ══════════════════════════════════════════════════════════ -->
  <nav id="navbar" role="navigation" aria-label="Main navigation">

    <!-- Hamburger (sidebar toggle) -->
    <button id="hamburgerBtn" aria-label="Toggle sidebar menu" aria-expanded="false" aria-controls="sidebar">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- Logo & Site Name -->
    <a id="logoLink" href="#/" aria-label="V Scans – Home">
      <img id="siteLogo"
           src="https://i.ibb.co/3YQx1Md2/0-DC7-EA69-7-A2-D-4588-9-BAE-3-D8018-FBA6-D0.png"
           alt="V Scans Logo"
           width="36" height="36">
      <span id="siteTitle">V Scans</span>
    </a>

    <!-- Search bar -->
    <div class="navbar-search" role="search">
      <input id="searchInput"
             type="search"
             placeholder="Search manga, genres…"
             aria-label="Search manga">
      <button id="searchBtn" aria-label="Submit search">🔍</button>
    </div>

    <!-- Admin Button (hidden until admin logs in) -->
    <button id="adminBtn" class="hidden" aria-label="Open admin dashboard">
      ⚙ Admin
    </button>

    <!-- Google Sign-In button (shown when logged out) -->
    <button id="loginBtn" aria-label="Sign in with Google">
      <svg width="16" height="16" viewBox="0 0 48 48" aria-hidden="true">
        <path fill="#FFF" d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/>
      </svg>
      Sign in with Google
    </button>

    <!-- User menu (shown when logged in) -->
    <div id="userMenu" class="relative hidden">
      <button id="userMenuToggle" aria-label="User menu" aria-haspopup="true" aria-expanded="false">
        <img id="userAvatar" src="" alt="Profile photo" width="30" height="30">
        <span id="userName"></span>
        <span aria-hidden="true">▾</span>
      </button>

      <!-- Dropdown -->
      <div id="userDropdown" class="hidden" role="menu">
        <button id="signOutBtn" role="menuitem">
          <span aria-hidden="true">🚪</span> Sign Out
        </button>
      </div>
    </div>

  </nav>
  <!-- /NAVBAR -->


  <!-- ══════════════════════════════════════════════════════════
       SIDEBAR OVERLAY (click to close)
  ══════════════════════════════════════════════════════════ -->
  <div id="sidebarOverlay" class="hidden" aria-hidden="true"></div>


  <!-- ══════════════════════════════════════════════════════════
       SIDEBAR
  ══════════════════════════════════════════════════════════ -->
  <aside id="sidebar" role="navigation" aria-label="Site navigation">
    <nav class="sidebar-nav" role="list">

      <a href="#/" data-nav="home" class="sidebar-link" role="listitem">
        <span class="sidebar-icon" aria-hidden="true">🏠</span>
        <span>Home</span>
      </a>

      <a href="#/categories" data-nav="categories" class="sidebar-link" role="listitem">
        <span class="sidebar-icon" aria-hidden="true">📚</span>
        <span>Categories</span>
      </a>

    </nav>

    <div class="sidebar-footer">
      <a href="https://www.paypal.me/AnouarBah"
         data-nav="donate"
         class="donate-btn"
         role="button"
         aria-label="Donate via PayPal">
        <span aria-hidden="true">💛</span>
        Donate via PayPal
      </a>
    </div>
  </aside>


  <!-- ══════════════════════════════════════════════════════════
       MAIN CONTENT AREA (SPA mounts here)
  ══════════════════════════════════════════════════════════ -->
  <main id="mainContent" role="main">
    <!-- App content renders here -->
    <div id="app" aria-live="polite" aria-atomic="false">
      <!-- Initial loading state -->
      <div class="flex flex-col items-center justify-center min-h-[70vh] gap-4">
        <div class="spinner"></div>
        <p class="text-gray-400 text-sm">Initializing V Scans…</p>
      </div>
    </div>
  </main>


  <!-- ══════════════════════════════════════════════════════════
       SCROLL TO TOP BUTTON
  ══════════════════════════════════════════════════════════ -->
  <button id="scrollTopBtn"
          class="opacity-0 pointer-events-none"
          aria-label="Scroll to top">
    ↑
  </button>


  <!-- ══════════════════════════════════════════════════════════
       TOAST NOTIFICATION CONTAINER
  ══════════════════════════════════════════════════════════ -->
  <div id="toastContainer" aria-live="assertive" aria-atomic="true" role="status"></div>


  <!-- ══════════════════════════════════════════════════════════
       FOOTER
  ══════════════════════════════════════════════════════════ -->
  <footer style="
    text-align: center;
    padding: 24px 20px;
    border-top: 1px solid #2a2a3a;
    color: #475569;
    font-size: 0.78rem;
    margin-top: auto;
  ">
    © 2025 V Scans. All manga titles and images belong to their respective authors. &nbsp;|&nbsp;
    <a href="https://www.paypal.me/AnouarBah"
       target="_blank"
       rel="noopener noreferrer"
       style="color: #f59e0b; text-decoration: underline;">Support us on PayPal 💛</a>
  </footer>


  <!-- ══════════════════════════════════════════════════════════
       JAVASCRIPT – ES Modules
       Firebase SDK is imported inside our own modules.
  ══════════════════════════════════════════════════════════ -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
